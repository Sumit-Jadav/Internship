<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html{
            width: 100vw;
            height: 100vh;
            font-size: 62.5%;
        }
        body{
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .container{
            width: 100%;
            height: auto;
            background-color: grey;
            display: flex;
            justify-content: center;
        }
        form{
            width: 90%;
            padding-left: .5rem;
            padding-right: .5rem;
            font-size: 1.5rem;
        }
        .detail-container{
            margin-top: .5rem;
        }
        .grid{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .5rem;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <form action="" method="post" id="job-application-form">
            <fieldset class="detail-container">
                <legend>Basic Details</legend>
                <div class="basic-details">
                    <!-- <h1>Basic Details</h1> -->
                    <div class="grid">
                        <div class="fname-container">
                            <label for="fname">First Name</label>
                            <input type="text" name="fname" id="fname">
                        </div>
                        <div class="lname-container">
                            <label for="lname">Last Name</label>
                            <input type="text" name="lname" id="lname">
                        </div>
                        <div class="designation-container">
                            <label for="designation">Designation</label>
                            <input type="text" name="designation" id="designation">
                        </div>
                        <div class="address-container">
                            <label for="fline">Addres Line1</label>
                            <input type="text" name="fline" id="fline">
                            <label for="sline">Address Line2</label>
                            <input type="text" name="sline" id="sline">
                        </div>
                        <div class="email-container">
                            <label for="email">Email</label>
                            <input type="text" name="email" id="email">
                        </div>
                        <div class="city-container">
                            <label for="city">City</label>
                            <input type="text" name="city" id="city">
                        </div>
                    </div>
                </div>
            </fieldset>



        </form>
    </div>
</body>
</html>
